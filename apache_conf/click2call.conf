# Click2Call API Configuration (for /api endpoints)
<Directory /var/www/html/api>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Uncomment to restrict by IP
    #<RequireAll>
    #    Require ip 127.0.0.1
    #    Require ip YOUR_IP_HERE
    #</RequireAll>

    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /api

        # Click2Call endpoint
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^v1/([^/]+)/click2call$ v1/click2call.php [QSA,L]

        # Agents Status endpoint
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^v1/([^/]+)/agents_status$ v1/agents_status.php [QSA,L]
    </IfModule>

    # Rate limiting
    <IfModule mod_ratelimit.c>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 400
    </IfModule>

    # Security headers
    Header set X-Frame-Options "DENY"
    Header set X-Content-Type-Options "nosniff"
    Header set X-XSS-Protection "1; mode=block"
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "POST, GET, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type"
</Directory>

# v1 subdirectory
<Directory /var/www/html/api/v1>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Block web access to CLI scripts
    <FilesMatch "^(manage_api_keys\.php|lg-presence\.php)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>
</Directory>

# Protect business logic and dependencies
<DirectoryMatch "^/var/www/html/api/(src|vendor)">
    Require all denied
</DirectoryMatch>

# Logging
ErrorLog ${APACHE_LOG_DIR}/click2call_error.log
CustomLog ${APACHE_LOG_DIR}/click2call_access.log combined